spring.application.name=ai-training-5th-may-breakout-2

# --- Datasource (local dev: postgres on localhost via docker compose) ---
spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/arrive_intel
spring.datasource.username=arrive
spring.datasource.password=arrive

# --- JPA ---
# Flyway owns the schema. validate catches entity/migration drift.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- SEMRush ---
# Monthly budget: 50,000 credits SHARED across the team. Be miserly.
# Default is fake client — flip semrush.live=true ONLY for the live demo or a deliberate spike.
semrush.api.key=${SEMRUSH_API_KEY:}
semrush.api.base-url=https://api.semrush.com/
semrush.database=us
semrush.live=${SEMRUSH_LIVE:false}
# Cap keyword-gap rows per call. domain_domains is ~40 credits PER ROW — keep this small.
semrush.gap-row-limit=25
# Reuse persisted SEMRush data instead of re-fetching if newer than this.
semrush.cache-ttl-hours=24
# Hard stop: monthly cap (estimated) before client refuses to call the API.
semrush.monthly-credit-budget=50000

# --- Vaadin ---
# Faster dev mode startup; production build done by `./gradlew bootJar -Pvaadin.productionMode`.
vaadin.launch-browser=false
